# Runa Agent — main configuration template
#
# Copy this file to ~/.runa/config/runa.yaml and edit per your deployment.
# This template intentionally errs on the side of cautious defaults.
#
# Every key has a default. The agent will start with this file untouched
# (no adapters, no chat bridges, no model provider). Enable surfaces by
# setting `enabled: true` on the corresponding subtree.
#
# Cross-reference: docs/architecture/{ARCHITECTURE,DATA_FLOW,DOMAIN_MAP}.md

# ---------------------------------------------------------------------------
# Runa identity
# ---------------------------------------------------------------------------
identity:
  name: "Runa"
  voice_profile: "default"   # See ~/.runa/identity/voices/
  persona_snapshot: null     # null = current; or a snapshot name to pin

# ---------------------------------------------------------------------------
# Standing trust policy
# ---------------------------------------------------------------------------
policy:
  # Standing-trust doctrine: Runa acts without per-action permission for
  # ordinary autonomous work. Items on `require_confirmation` always ask.
  require_confirmation:
    - delete_file_outside_runa_home
    - send_external_message_to_new_recipient
    - install_or_remove_plugin
  forbid:
    - access_secrets_outside_runa_secrets
    - modify_own_policy_at_runtime

# ---------------------------------------------------------------------------
# Memory (Muninn)
# ---------------------------------------------------------------------------
memory:
  store: "muninn"
  retrieval:
    top_k: 12
    similarity_threshold: 0.35
  retention:
    episodes_days: 365         # 0 = forever
    audit_log_days: 90

# ---------------------------------------------------------------------------
# Task ledger (Skuld)
# ---------------------------------------------------------------------------
tasks:
  store: "skuld"
  recovery:
    on_interrupted_task: "ask"  # "resume" | "abandon" | "ask"

# ---------------------------------------------------------------------------
# World model bridge (WYRD)
# ---------------------------------------------------------------------------
world:
  enabled: false
  endpoint: null               # e.g. "http://100.x.y.z:port" on Tailnet
  refresh_seconds: 30

# ---------------------------------------------------------------------------
# Emotional state (Eldhugi)
# ---------------------------------------------------------------------------
emotions:
  enabled: true
  decay_minutes: 60            # how quickly emotional deltas fade

# ---------------------------------------------------------------------------
# Model router (Heimskringla)
# ---------------------------------------------------------------------------
models:
  default_provider: "ollama"
  providers:
    ollama:
      enabled: true
      host: "http://127.0.0.1:11434"
      default_model: "llama3.2"
    openrouter:
      enabled: false
      api_key_env: "OPENROUTER_API_KEY"
      default_model: "anthropic/claude-3.5-sonnet"
    lmstudio:
      enabled: false
      host: "http://127.0.0.1:1234"

# ---------------------------------------------------------------------------
# Surfaces (Face of the World)
# ---------------------------------------------------------------------------
surfaces:
  cli:        { enabled: true }
  gui:        { enabled: false }
  voice:      { enabled: false, wake_word: "runa" }
  gateway:    { enabled: false, host: "127.0.0.1", port: 8888 }

# ---------------------------------------------------------------------------
# Adapters (Bifröst tributaries)
# ---------------------------------------------------------------------------
adapters:
  discord:        { enabled: false }
  telegram:       { enabled: false }
  matrix:         { enabled: false }
  home_assistant: { enabled: false }
  mcp:            { enabled: false }

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  enabled: false
  search_paths:
    - "~/.runa/plugins"

# ---------------------------------------------------------------------------
# Health & self-repair (Eir)
# ---------------------------------------------------------------------------
repair:
  enabled: true
  drift_check_seconds: 300
  on_corrupted_store: "ask"     # "ask" | "auto_repair" | "halt"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"
  audit:
    enabled: true
    path: "~/.runa/logs/audit/"
  redact_keys:
    - "*_KEY"
    - "*_TOKEN"
    - "*_PASSWORD"
    - "*_SECRET"
